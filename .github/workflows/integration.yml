name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  native-os:
    name: Native ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install Prerequisites (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          # Install UV
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

          # Install Mise
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Prerequisites (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Install UV
          powershell -ExecutionPolicy ByPass -c "irm https://astral.sh/uv/install.ps1 | iex"
          echo "$env:USERPROFILE\.local\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          # Mise is not officially supported on Windows, so we skip it or use a workaround if needed.
          # For now, we'll just skip it as per review feedback.

      - name: Install Prerequisites (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y hello flatpak
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Install Prerequisites (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install hello

      - name: Build cloakpkg
        run: go build -o cloakpkg .

      - name: Verify Installer Availability
        shell: bash
        run: ./cloakpkg list-installers

      - name: Run Hierarchy Test (Dry-run)
        shell: bash
        run: ./cloakpkg install testdata/workflow-test.yaml -t hierarchy -n -v

      - name: Run OS Detection Test
        shell: bash
        run: ./cloakpkg install testdata/workflow-test.yaml -t os-detection -v

      - name: Run NPM Test
        shell: bash
        run: ./cloakpkg install testdata/workflow-test.yaml -t npm -v

      - name: Run UVX Test
        shell: bash
        run: ./cloakpkg install testdata/workflow-test.yaml -t uvx -v

      - name: Run Snap Tests (Ubuntu Only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo ./cloakpkg install testdata/workflow-test.yaml -t snap -v
          sudo ./cloakpkg install testdata/workflow-test.yaml -t snap-classic -v

      - name: Run Flatpak Test (Ubuntu Only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          ./cloakpkg install testdata/workflow-test.yaml -t flatpak -v

      - name: Run Brew Cask Test (macOS Only)
        if: matrix.os == 'macos-latest'
        run: |
          ./cloakpkg install testdata/workflow-test.yaml -t brew-cask -v

      - name: Run All-Available Providers Test
        shell: bash
        run: ./cloakpkg install testdata/workflow-test-no-priority.yaml -v

      - name: Run Check Command
        shell: bash
        run: ./cloakpkg check testdata/workflow-test.yaml

      - name: Run Uninstall Test
        shell: bash
        run: |
          # Use sudo on Linux for system package managers
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            sudo ./cloakpkg uninstall testdata/workflow-test.yaml -t apt,snap,snap-classic -v
          fi
          ./cloakpkg uninstall testdata/workflow-test.yaml -t npm,uvx,brew -v

  linux-distros:
    name: Linux Distro ${{ matrix.distro }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro: [fedora, archlinux]
    container:
      image: ${{ matrix.distro == 'fedora' && 'fedora:latest' || 'archlinux:latest' }}

    steps:
      - name: Install Prerequisites (Fedora)
        if: matrix.distro == 'fedora'
        run: dnf install -y go git curl findutils nodejs npm

      - name: Install Prerequisites (Arch)
        if: matrix.distro == 'archlinux'
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm go git curl base-devel nodejs npm

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install UV & Mise
        shell: bash
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build cloakpkg
        run: go build -o cloakpkg .

      - name: Verify Installer Availability
        run: ./cloakpkg list-installers

      - name: Run Distro Specific Test
        shell: bash
        run: |
          if [[ "${{ matrix.distro }}" == "fedora" ]]; then
            ./cloakpkg install testdata/workflow-test.yaml -t dnf -v
          else
            ./cloakpkg install testdata/workflow-test.yaml -t pacman -v
          fi

      - name: Run Hierarchy Test
        run: ./cloakpkg install testdata/workflow-test.yaml -t hierarchy -v

      - name: Run All-Available Providers Test
        run: ./cloakpkg install testdata/workflow-test-no-priority.yaml -v
