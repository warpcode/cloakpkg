name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  native-os:
    name: Native ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build cloakpkg
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            go build -buildvcs=false -o cloakpkg.exe .
            echo "CLOAKPKG=./cloakpkg.exe" >> $GITHUB_ENV
          else
            go build -buildvcs=false -o cloakpkg .
            echo "CLOAKPKG=./cloakpkg" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Install Prerequisites (System)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            sudo apt-get update
            sudo apt-get install -y sl flatpak
            sudo flatpak remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          elif [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            brew install sl
          fi

      - name: Install Tools via Cloakpkg (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          $CLOAKPKG install testdata/workflow-test.yaml -t prereqs-unix -v
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Tools via Cloakpkg (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          $CLOAKPKG install testdata/workflow-test.yaml -t prereqs-windows -v
          echo "$USERPROFILE/.local/bin" >> $GITHUB_PATH

      - name: Verify Installer Availability
        shell: bash
        run: $CLOAKPKG list-installers

      - name: Run Consolidated System Test
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            sudo $CLOAKPKG install testdata/workflow-test.yaml -t system -v
          else
            $CLOAKPKG install testdata/workflow-test.yaml -t system -v
          fi

      - name: Run Hierarchy Test (Dry-run)
        shell: bash
        run: $CLOAKPKG install testdata/workflow-test.yaml -t hierarchy -n -v

      - name: Run OS Detection Test
        shell: bash
        run: $CLOAKPKG install testdata/workflow-test.yaml -t os-detection -v

      - name: Run NPM Test
        shell: bash
        run: $CLOAKPKG install testdata/workflow-test.yaml -t npm -v

      - name: Run UVX Test
        shell: bash
        run: $CLOAKPKG install testdata/workflow-test.yaml -t uvx -v

      - name: Run Snap Tests (Ubuntu Only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo $CLOAKPKG install testdata/workflow-test.yaml -t snap -v
          sudo $CLOAKPKG install testdata/workflow-test.yaml -t snap-classic -v

      - name: Run Flatpak Test (Ubuntu Only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo $CLOAKPKG install testdata/workflow-test.yaml -t flatpak -v

      - name: Run Brew Cask Test (macOS Only)
        if: matrix.os == 'macos-latest'
        run: |
          $CLOAKPKG install testdata/workflow-test.yaml -t brew-cask -v

      - name: Run All-Available Providers Test
        shell: bash
        run: $CLOAKPKG install testdata/workflow-test-no-priority.yaml -v

      - name: Run Check Command
        shell: bash
        run: $CLOAKPKG check testdata/workflow-test.yaml

      - name: Run Uninstall Test
        shell: bash
        run: |
          # Use sudo on Linux for system package managers
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            sudo $CLOAKPKG uninstall testdata/workflow-test.yaml -t system,snap,snap-classic -v
          fi
          $CLOAKPKG uninstall testdata/workflow-test.yaml -t npm,uvx,brew -v

  linux-distros:
    name: Linux Distro ${{ matrix.distro }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro: [fedora, archlinux]
    container:
      image: ${{ matrix.distro == 'fedora' && 'fedora:latest' || 'archlinux:latest' }}

    steps:
      - name: Install Prerequisites (Fedora)
        if: matrix.distro == 'fedora'
        run: dnf install -y golang git curl findutils nodejs npm

      - name: Install Prerequisites (Arch)
        if: matrix.distro == 'archlinux'
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm
          pacman -S --noconfirm go git curl base-devel nodejs npm

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build cloakpkg
        run: go build -buildvcs=false -o cloakpkg .

      - name: Install UV & Mise via Cloakpkg
        shell: bash
        run: |
          ./cloakpkg install testdata/workflow-test.yaml -t prereqs-unix -v
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify Installer Availability
        run: ./cloakpkg list-installers

      - name: Run Consolidated System Test
        run: ./cloakpkg install testdata/workflow-test.yaml -t system -v

      - name: Run Hierarchy Test
        run: ./cloakpkg install testdata/workflow-test.yaml -t hierarchy -v

      - name: Run All-Available Providers Test
        run: ./cloakpkg install testdata/workflow-test-no-priority.yaml -v
