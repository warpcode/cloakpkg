name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*' # Triggers on release tags like v1.0.0
  workflow_dispatch:

permissions:
  contents: write # Required to create/update releases and push tags

jobs:
  build-and-publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Essential for tagging and tag manipulation

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Get Commit Info
        run: |
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "COMMIT_MSG=$(git log -1 --format=%s)" >> $GITHUB_ENV

      - name: Build All Targets
        run: |
          mkdir -p dist
          
          # List of GOOS/GOARCH/BinarySuffix mappings
          targets=(
            "linux/amd64/linux-amd64"
            "linux/arm64/linux-arm64"
            "linux/arm/linux-arm"
            "darwin/amd64/macos-amd64"
            "darwin/arm64/macos-arm64"
            "windows/amd64/windows-amd64.exe"
            "windows/arm64/windows-arm64.exe"
          )
          
          for target in "${targets[@]}"; do
            IFS="/" read -r goos goarch release_name <<< "$target"
            echo "Building for ${goos}/${goarch}..."
            
            # -s -w linker flags strip debug information and symbols to minimize binary size
            CGO_ENABLED=0 GOOS=${goos} GOARCH=${goarch} go build \
              -ldflags="-s -w" \
              -o "dist/cloakpkg-${release_name}" \
              .
          done

      - name: Generate Checksums
        run: |
          cd dist
          sha256sum cloakpkg-* > checksums.txt
          cat checksums.txt

      # ----------------------------------------------------
      # Mode A: Dev Release (Every push to main, or manual runs)
      # ----------------------------------------------------
      - name: Move Dev Tag
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          github.event_name == 'workflow_dispatch'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f dev
          git push --force origin dev

      - name: Publish Dev Release
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: dev
          name: "Development Build"
          body: |
            These are the latest development binaries of `cloakpkg` compiled from `main`.
            
            > [!WARNING]
            > These builds are compiled automatically from the latest commits to `main` and may be unstable.
            
            **Latest Commit**: [`${{ env.SHORT_SHA }}`](https://github.com/warpcode/cloakpkg/commit/${{ github.sha }}) - *"${{ env.COMMIT_MSG }}"*
          prerelease: true
          files: |
            dist/cloakpkg-*
            dist/checksums.txt

      # ----------------------------------------------------
      # Mode B: Official Release (For Version Tag Pushes)
      # ----------------------------------------------------
      - name: Publish Official Release
        if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/cloakpkg-*
            dist/checksums.txt
          draft: false
          prerelease: false
          generate_release_notes: true
