settings:
  provider_priority: [brew, apt, dnf, pacman, snap, flatpak, npm, uvx, custom]

bundles:
  # Basic package manager tests
  test-apt:
    tags: [apt]
    providers:
      apt:
        packages: [sl]

  test-dnf:
    tags: [dnf]
    providers:
      dnf:
        packages: [sl]

  test-pacman:
    tags: [pacman]
    providers:
      pacman:
        packages: [sl]

  test-brew:
    tags: [brew]
    providers:
      brew:
        packages: [sl]

  test-brew-cask:
    tags: [brew-cask]
    providers:
      brew:
        packages:
          - name: font-inter
            extra_params: ["--cask"]

  test-snap:
    tags: [snap]
    providers:
      snap:
        packages: [hello-world]

  test-snap-classic:
    tags: [snap-classic]
    providers:
      snap:
        packages:
          - name: hello-world
            extra_params: ["--classic"]

  test-flatpak:
    tags: [flatpak]
    providers:
      flatpak:
        repositories:
          - source: "flathub https://dl.flathub.org/repo/flathub.flatpakrepo"
        packages:
          - name: org.gnome.HexEditor
            extra_params: ["flathub"]

  test-npm:
    tags: [npm]
    providers:
      npm:
        packages: [is-sorted]

  test-uvx:
    tags: [uvx]
    providers:
      uvx:
        packages: [pycowsay]

  # Hierarchy and Priority tests
  test-hierarchy:
    tags: [hierarchy]
    description: "Tests that the first available provider is chosen"
    providers:
      brew:
        packages: [sl]
      apt:
        packages: [sl]
      dnf:
        packages: [sl]
      pacman:
        packages: [sl]
      custom:
        # Cross-platform check: command -v is sh, where is cmd
        detect: "sl --version"
        install: "echo 'Fallback to custom install'"

  test-all-available:
    tags: [all-available]
    description: "Tests execution of all available providers when priority is empty"
    # To test this, we'll need a different config or run with a config that has empty priority
    providers:
      npm:
        packages: [is-sorted]
      custom:
        install: "echo 'Custom provider running alongside npm'"

  # OS detection test (via custom detect)
  test-os-detection:
    tags: [os-detection]
    providers:
      custom:
        # Cross-platform check (sh-compatible on Unix, cmd-compatible on Windows)
        detect: "echo Testing-OS-Detection"
        install: "echo OS-detected-successfully"
